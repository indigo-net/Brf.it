title: Brf.it
description: AI 코딩 어시스턴트를 위한 스마트 코드 압축 CLI 도구
tagline: 50 tokens → 8 tokens
url: "https://indigo-net.github.io"
baseurl: "/Brf.it"

remote_theme: just-the-docs/just-the-docs

# 언어 설정
lang: en
languages: ["en", "ko", "ja", "de", "hi"]

# 검색
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

# 네비게이션
nav_enabled: true
nav_external_links:
  - title: GitHub
    url: https://github.com/indigo-net/Brf.it
    hide_icon: false

# 색상 테마
color_scheme: light

# 호출아웃
callouts:
  note:
    color: blue
  warning:
    color: yellow
  important:
    color: red
  tip:
    color: green

# 메리메이드
mermaid:
  version: "10.9.0"

# 플러그인 (GitHub Pages 지원)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# 제외 파일
exclude:
  - "*.go"
  - "cmd/"
  - "pkg/"
  - "internal/"
  - "testdata/"
  - "docs/plans/"
  - "Makefile"
  - "go.mod"
  - "go.sum"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules/"
  - "vendor/"
  - "SAMPLE.md"
  - "SAMPLE.xml"

# 기본값
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"
      nav_order: 1
