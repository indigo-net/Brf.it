name: 🏷️ Auto Labeler

on:
  pull_request:
    types: [opened, synchronize]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Label PR based on files
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler-config.yml

  label-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: 🏷️ Label Issue based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            // 커밋 타입 기반 라벨링
            if (title.startsWith('feat:') || title.startsWith('feature:')) {
              labels.push('enhancement');
            } else if (title.startsWith('fix:') || title.startsWith('bugfix:')) {
              labels.push('bug');
            } else if (title.startsWith('docs:') || title.startsWith('doc:')) {
              labels.push('documentation');
            } else if (title.startsWith('refactor:')) {
              labels.push('refactor');
            } else if (title.startsWith('test:') || title.startsWith('testing:')) {
              labels.push('testing');
            } else if (title.startsWith('chore:')) {
              labels.push('chore');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
