name: 🐛 버그 리포트 (Bug Report)
description: 버그를 발견하셨나요? 알려주시면 빠르게 수정하겠습니다.
labels: [bug]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해 주셔서 감사합니다! 🙏
        아래 정보를 최대한 자세히 적어주세요.

  - type: textarea
    id: steps
    attributes:
      label: 📋 재현 단계 (Steps to Reproduce)
      description: 버그를 재현할 수 있는 단계를 설명해주세요
      placeholder: |
        1. '...' 명령 실행
        2. '...' 옵션 사용
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 기대 동작 (Expected Behavior)
      description: 정상적으로 동작해야 하는 모습을 설명해주세요
      placeholder: 예: XML 형식으로 출력되어야 합니다.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ 실제 동작 (Actual Behavior)
      description: 실제로 어떤 일이 발생했나요?
      placeholder: 예: 에러 메시지가 출력되고 종료됩니다.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 🖥️ 환경 (Environment)
      description: 사용 중인 환경을 알려주세요
      placeholder: "macOS 14, Go 1.22, brfit v0.16.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📝 로그/에러 메시지 (Logs/Error Messages)
      description: 관련 로그나 에러 메시지를 붙여넣어주세요
      placeholder: |
        Error: failed to parse file...
        Stack trace: ...
      render: shell

  - type: dropdown
    id: version_impact
    attributes:
      label: 🏷️ 버전 영향도 (Version Impact)
      description: 이 버그 수정 시 예상되는 버전 변경
      options:
        - patch (버그 수정)
        - minor (기능 개선 포함)
        - major (Breaking change)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 📎 추가 정보 (Additional Context)
      description: 문제 해결에 도움이 될 만한 추가 정보가 있다면 적어주세요
      placeholder: 예: 특정 파일에서만 발생, 최근 버전부터 발생 등
