# PR 파일 경로 기반 자동 라벨링 설정
# actions/labeler@v5 문법

# Language labels
language/go:
  - changed-files:
      - any-glob-to-any-file:
          - "pkg/**/*.go"
          - "cmd/**/*.go"
          - "internal/**/*.go"

language/typescript:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.ts"
          - "**/*.tsx"
          - "**/*.js"
          - "**/*.jsx"

language/python:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.py"

language/rust:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.rs"

# Type labels
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CHANGELOG.md"
          - "docs/**/*"
          - "**/*.md"

testing:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*_test.go"
          - "testdata/**/*"
          - ".github/workflows/*test*"

chore:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**/*"
          - ".goreleaser.yml"
          - "install.sh"
          - "install.ps1"
          - "go.mod"
          - "go.sum"
